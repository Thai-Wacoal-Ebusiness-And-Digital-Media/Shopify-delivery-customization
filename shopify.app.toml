  "https://your-site.netlify.app/auth/callback",
  "https://your-site.netlify.app/auth/shopify/callback",
  "https://your-site.netlify.app/api/auth/callback"
]

[webhooks]
api_version = "2026-01"

[pos]
embedded = false
